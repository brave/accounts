এই ইমেইল ঠিকানা ব্যবহার করে লগইন করার চেষ্টা করুন। যদি এখনও সাহায্যের প্রয়োজন হয়, অনুগ্রহ করে Brave সাপোর্টের সাথে যোগাযোগ করুন।"""

