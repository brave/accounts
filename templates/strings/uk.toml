Здається, у вас вже є обліковий запис, зареєстрований на цю адресу: {{.Email}}.

Спробуйте увійти, використовуючи цю адресу електронної пошти. Якщо вам потрібна допомога, зверніться до служби підтримки Brave."""

[SimilarEmailSubject]
description = "Subject for informing the user that an account exists with a similar email address after an unsuccessful login attempt"
other = "Маєте проблеми? Ось як отримати доступ до облікового запису Brave."

[EmailSignature]
description = "Email signature"
other = "Команда Brave"

[EmailDisregard]
description = "Instructs the user to ignore the email if the user did not initiate the verification or login request"
other = "Якщо ви не робили цього запиту, будь ласка, ігноруйте цей лист."

